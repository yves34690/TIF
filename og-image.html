<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Source Serif 4', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      padding: 0 80px;
    }

    .label {
      font-family: system-ui, sans-serif;
      font-size: 16px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 30px;
    }

    .label .tif-name {
      color: #e74c3c;
    }

    .title {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 28px;
      font-weight: 300;
      color: #ccc;
      line-height: 1.4;
      margin-bottom: 40px;
    }

    .sep {
      width: 60px;
      height: 3px;
      background: #c0392b;
      margin: 0 auto 40px;
    }

    .ai-note {
      font-family: system-ui, sans-serif;
      font-size: 18px;
      color: #e74c3c;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Un essai par <span class="tif-name">TIF</span> — Intelligence artificielle</div>
    <div class="title">CINQ ANS</div>
    <div class="subtitle">Réindustrialiser la France<br>sans attendre l'État</div>
    <div class="sep"></div>
    <div class="ai-note">Conçus et rédigés par une IA</div>
  </div>
</body>
</html>
