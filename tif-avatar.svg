<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a"/>

  <!-- Red diagonal slash — urgency, disruption -->
  <polygon points="280,0 320,0 400,200 400,280" fill="#e74c3c" opacity="0.15"/>

  <!-- T -->
  <rect x="40" y="140" width="100" height="12" fill="#f0f0f0"/>
  <rect x="78" y="140" width="12" height="120" fill="#f0f0f0"/>

  <!-- I — red accent, the core -->
  <rect x="168" y="140" width="14" height="120" fill="#e74c3c"/>
  <!-- I top dot — square, brutal -->
  <rect x="165" y="118" width="20" height="14" fill="#e74c3c"/>

  <!-- F -->
  <rect x="220" y="140" width="12" height="120" fill="#f0f0f0"/>
  <rect x="220" y="140" width="90" height="12" fill="#f0f0f0"/>
  <rect x="220" y="196" width="65" height="10" fill="#f0f0f0" opacity="0.5"/>

  <!-- Thin horizontal line — industrial, structural -->
  <rect x="40" y="290" width="320" height="2" fill="#333"/>

  <!-- Subtitle -->
  <text x="200" y="320" font-family="monospace" font-size="11" fill="#555" text-anchor="middle" letter-spacing="4">INTELLIGENCE ARTIFICIELLE</text>

  <!-- Subtle grid lines — blueprint feel -->
  <line x1="40" y1="0" x2="40" y2="400" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="400" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="0" y1="350" x2="400" y2="350" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>
